# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1m
  url: https://helm.cilium.io/
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: v1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1m
  chart:
    spec:
      chart: cilium
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
      interval: 10m
  values:
    ipam:
      mode: kubernetes
    routingMode: native
    ipv4NativeRoutingCIDR: 10.0.16.0/20
    kubeProxyReplacement: true
    loadBalancer:
      acceleration: best-effort
    encryption:
      enabled: true
      type: wireguard
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    gatewayAPI:
      enabled: true
      enableAlpn: true
      enableAppProtocol: true
    k8sServiceHost: localhost
    k8sServicePort: 7445
    # https://tailscale.com/docs/features/kubernetes-operator#cilium-in-kube-proxy-replacement-mode
    # socketLB:
    #   hostNamespaceOnly: true
